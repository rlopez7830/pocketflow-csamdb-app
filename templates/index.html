<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline CSAM Image Lookup</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, Helvetica, sans-serif; background: #f4f6f8; color: #333; padding: 24px; }
        h1 { margin-bottom: 16px; }
        .card { background: #fff; border-radius: 8px; padding: 24px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.1); max-width: 960px; margin-left: auto; margin-right: auto; }
        label { font-weight: bold; display: block; margin-bottom: 6px; }
        input[type=text] { width: 260px; padding: 8px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        button { padding: 8px 18px; background: #0071c5; color: #fff; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; margin-left: 8px; }
        button:disabled { opacity: .55; cursor: default; }
        button:hover:not(:disabled) { background: #005a9e; }
        .status { margin-top: 12px; font-style: italic; color: #555; }
        .error { color: #c00; margin-top: 12px; }
        .meta-section { margin-top: 16px; }
        .meta-section h3 { margin-bottom: 8px; }
        table { border-collapse: collapse; width: 100%; margin-bottom: 12px; }
        th, td { text-align: left; padding: 6px 10px; border-bottom: 1px solid #ddd; font-size: 13px; }
        th { background: #e9ecef; }
        .gallery { display: flex; flex-wrap: wrap; gap: 16px; margin-top: 12px; }
        .gallery-item { background: #fafafa; border: 1px solid #ddd; border-radius: 6px; padding: 8px; text-align: center; max-width: 800px; }
        .gallery-item img { max-width: 100%; border-radius: 4px; cursor: pointer; }
        .gallery-item img:hover { opacity: .85; }
        .gallery-item .img-label { font-size: 12px; color: #666; margin-top: 4px; word-break: break-all; }
        .gallery-item .img-error { font-size: 12px; color: #c00; margin-top: 4px; }
        .hidden { display: none; }
        .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85); z-index: 1000; justify-content: center; align-items: center; cursor: pointer; }
        .lightbox.active { display: flex; }
        .lightbox img { max-width: 95vw; max-height: 95vh; border-radius: 6px; box-shadow: 0 4px 20px rgba(0,0,0,.5); }
    </style>
</head>
<body>
    <div class="card">
        <h1>Inline CSAM Image Lookup</h1>
        <form id="lookupForm" onsubmit="return doLookup(event)">
            <label for="vidInput">Visual ID (VID)</label>
            <input type="text" id="vidInput" placeholder="e.g. D609A810" autocomplete="off" required>
            <button type="submit" id="lookupBtn">Lookup</button>
        </form>
        <div id="statusArea" class="status hidden"></div>
        <div id="errorArea" class="error hidden"></div>
    </div>

    <div id="resultCard" class="card hidden">
        <h2 id="resultTitle"></h2>

        <div id="metaSection" class="meta-section hidden">
            <h3>Manufacturing Metadata</h3>
            <table id="ariesTable">
                <thead><tr><th>Visual ID</th><th>Lot</th><th>Operation</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>

        <div id="dirSection" class="meta-section hidden">
            <h3>Image Source Directories</h3>
            <table id="dirTable">
                <thead><tr><th>Directory</th><th>Exists</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>

        <div id="imageSection" class="meta-section hidden">
            <h3>Images</h3>
            <div id="gallery" class="gallery"></div>
        </div>
    </div>

    <div id="lightbox" class="lightbox" onclick="this.classList.remove('active')">
        <img id="lightboxImg" src="" alt="Enlarged view">
    </div>

    <script>
        function show(el){ el.classList.remove('hidden'); }
        function hide(el){ el.classList.add('hidden'); }
        function setText(el, t){ el.textContent = t; }

        async function doLookup(e){
            e.preventDefault();
            var vid = document.getElementById('vidInput').value.trim();
            if(!vid) return false;

            var btn = document.getElementById('lookupBtn');
            var statusArea = document.getElementById('statusArea');
            var errorArea = document.getElementById('errorArea');
            var resultCard = document.getElementById('resultCard');

            btn.disabled = true;
            hide(errorArea);
            hide(resultCard);
            setText(statusArea, 'Looking up VID ' + vid + ' …');
            show(statusArea);

            try {
                var resp = await fetch('/lookup?vid=' + encodeURIComponent(vid));
                var data = await resp.json();
                hide(statusArea);

                if(data.status === 'error'){
                    setText(errorArea, data.message || 'An unknown error occurred.');
                    show(errorArea);
                    btn.disabled = false;
                    return false;
                }

                renderResult(data);
            } catch(err) {
                hide(statusArea);
                setText(errorArea, 'Network error: ' + err.message);
                show(errorArea);
            }
            btn.disabled = false;
            return false;
        }

        function renderResult(data){
            var resultCard = document.getElementById('resultCard');
            document.getElementById('resultTitle').textContent = data.message || '';

            // ARIES metadata
            var metaSection = document.getElementById('metaSection');
            var tbody = document.querySelector('#ariesTable tbody');
            tbody.innerHTML = '';
            var aries = (data.manufacturing && data.manufacturing.aries_results) || [];
            if(aries.length){
                aries.forEach(function(r){
                    var tr = document.createElement('tr');
                    tr.innerHTML = '<td>'+esc(r.visual_id)+'</td><td>'+esc(r.lot_1)+'</td><td>'+esc(r.operation_1)+'</td>';
                    tbody.appendChild(tr);
                });
                show(metaSection);
            } else { hide(metaSection); }

            // Directories
            var dirSection = document.getElementById('dirSection');
            var dtbody = document.querySelector('#dirTable tbody');
            dtbody.innerHTML = '';
            var dirs = data.directories || [];
            if(dirs.length){
                dirs.forEach(function(d){
                    var tr = document.createElement('tr');
                    tr.innerHTML = '<td>'+esc(d.directory)+'</td><td>'+(d.exists ? 'Yes' : 'No')+'</td>';
                    dtbody.appendChild(tr);
                });
                show(dirSection);
            } else { hide(dirSection); }

            // Images
            var imageSection = document.getElementById('imageSection');
            var gallery = document.getElementById('gallery');
            gallery.innerHTML = '';
            var imgs = data.images || [];
            if(imgs.length){
                imgs.forEach(function(img){
                    var div = document.createElement('div');
                    div.className = 'gallery-item';
                    if(img.status === 'ready'){
                        div.innerHTML = '<img src="'+esc(img.image_url)+'" alt="'+esc(img.file_name)+'" onclick="openLightbox(this.src)">'
                            + '<div class="img-label">'+esc(img.file_name)+'</div>';
                    } else {
                        div.innerHTML = '<div class="img-error">'+esc(img.message || 'Image unavailable')+'</div>'
                            + '<div class="img-label">'+esc(img.file_name)+'</div>';
                    }
                    gallery.appendChild(div);
                });
                show(imageSection);
            } else { hide(imageSection); }

            show(resultCard);
        }

        function openLightbox(src){
            var lb = document.getElementById('lightbox');
            document.getElementById('lightboxImg').src = src;
            lb.classList.add('active');
        }

        function esc(s){
            if(!s) return '';
            var d = document.createElement('div');
            d.appendChild(document.createTextNode(s));
            return d.innerHTML;
        }
    </script>
</body>
</html>
